# ---------------------------------------------------------------------------
# MCP error-semantics scenarios
# These scenarios assert the correct error codes and data shapes returned by
# the tool registry, covering the three error paths:
#   TOOL_NOT_FOUND  – unregistered tool name
#   INVALID_ARGS    – wrong arity / missing required argument (TypeError)
#   TOOL_ERROR      – bad argument value causes an exception inside the tool
#   NO_DATA         – tool-level sentinel for missing optional input
# ---------------------------------------------------------------------------

# ============================================================
# Error path: TOOL_NOT_FOUND
# ============================================================

- id: unknown_tool
  description: Calling an unregistered tool returns TOOL_NOT_FOUND
  tool_call:
    tool: "nonexistent_tool"
    args: {}
  expected_result:
    success: false
    error_code: "TOOL_NOT_FOUND"

- id: empty_tool_name
  description: Empty string tool name is also not registered → TOOL_NOT_FOUND
  tool_call:
    tool: ""
    args: {}
  expected_result:
    success: false
    error_code: "TOOL_NOT_FOUND"

# ============================================================
# Error path: INVALID_ARGS (TypeError from missing required argument)
# ============================================================

- id: invalid_args_missing_required_habit_streak
  description: >
    get_habit_streak requires 'habits' and 'reference_date'.
    Calling with empty args raises TypeError → INVALID_ARGS.
  tool_call:
    tool: "get_habit_streak"
    args: {}
  expected_result:
    success: false
    error_code: "INVALID_ARGS"

- id: invalid_args_missing_required_workout_frequency
  description: >
    get_workout_frequency requires 'workouts' and 'reference_date'.
    Calling with empty args raises TypeError → INVALID_ARGS.
  tool_call:
    tool: "get_workout_frequency"
    args: {}
  expected_result:
    success: false
    error_code: "INVALID_ARGS"

- id: invalid_args_extra_kwargs
  description: >
    Unexpected keyword argument causes TypeError → INVALID_ARGS.
  tool_call:
    tool: "get_goal_status"
    args:
      goals: []
      unexpected_arg: "value"
  expected_result:
    success: false
    error_code: "INVALID_ARGS"

# ============================================================
# Error path: TOOL_ERROR (bad value causes exception inside tool)
# ============================================================

- id: tool_error_bad_goal_type
  description: >
    Passing a string instead of a list to get_goal_status triggers an
    AttributeError inside the tool body → TOOL_ERROR.
  tool_call:
    tool: "get_goal_status"
    args:
      goals: "not_a_list"
  expected_result:
    success: false
    error_code: "TOOL_ERROR"

- id: tool_error_bad_task_type
  description: >
    Passing a string instead of a list to get_task_urgency triggers an
    error inside the tool body → TOOL_ERROR.
  tool_call:
    tool: "get_task_urgency"
    args:
      tasks: "not_a_list"
  expected_result:
    success: false
    error_code: "TOOL_ERROR"

# ============================================================
# Tool-level NO_DATA sentinel
# ============================================================

- id: lifewheel_no_data_null_input
  description: Null lifewheel argument → success=false with NO_DATA error code
  tool_call:
    tool: "get_lifewheel_scores"
    args:
      lifewheel: null
  expected_result:
    success: false
    error_code: "NO_DATA"

- id: lifewheel_no_data_omitted_input
  description: >
    Calling get_lifewheel_scores with no args uses the default (None)
    → NO_DATA.
  tool_call:
    tool: "get_lifewheel_scores"
    args: {}
  expected_result:
    success: false
    error_code: "NO_DATA"

# ============================================================
# Success paths – verify data shape
# ============================================================

- id: get_goal_status_success
  description: Valid goal list returns success with total/active/completed/active_goals
  tool_call:
    tool: "get_goal_status"
    args:
      goals:
        - id: g1
          title: "Write book"
          status: "진행중"
          progress: 50
  expected_result:
    success: true
    data_keys:
      - total
      - active
      - completed
      - active_goals

- id: get_goal_status_empty_list
  description: Empty goals list still succeeds and returns zero counts
  tool_call:
    tool: "get_goal_status"
    args:
      goals: []
  expected_result:
    success: true
    data_keys:
      - total
      - active

- id: get_task_urgency_success
  description: Valid tasks return success with Q1/Q2 breakdown
  tool_call:
    tool: "get_task_urgency"
    args:
      tasks:
        - id: t1
          title: "Fix critical bug"
          quadrant: "Q1"
          completed: false
  expected_result:
    success: true
    data_keys:
      - pending_q1
      - pending_q2
      - q1_tasks
      - q2_tasks

- id: get_habit_streak_success
  description: Valid habit data with reference_date returns habits with days_since
  tool_call:
    tool: "get_habit_streak"
    args:
      habits:
        - id: h1
          name: "Morning run"
          checkDates:
            - "2025-01-13"
            - "2025-01-14"
      reference_date: "2025-01-15"
  expected_result:
    success: true
    data_keys:
      - habits

- id: get_workout_frequency_success
  description: Valid workout data with reference_date returns last_7_days count
  tool_call:
    tool: "get_workout_frequency"
    args:
      workouts:
        - id: w1
          date: "2025-01-13"
          type: "달리기"
          duration: 30
      reference_date: "2025-01-15"
  expected_result:
    success: true
    data_keys:
      - last_7_days
      - workouts

- id: get_lifewheel_scores_success
  description: Valid lifewheel returns scores, low_domains, and average
  tool_call:
    tool: "get_lifewheel_scores"
    args:
      lifewheel:
        scores:
          건강: 7
          재정: 6
          커리어: 8
          관계: 9
          성장: 7
          여가: 8
          환경: 6
          정신/영적: 7
  expected_result:
    success: true
    data_keys:
      - scores
      - low_domains
      - average
