# ---------------------------------------------------------------------------
# Signal-decision scenarios
# reference_date: 2025-01-15  (all relative dates use this anchor)
# ---------------------------------------------------------------------------

# ============================================================
# goal_progress signals
# ============================================================

- id: goal_no_data
  description: No goals → no_data signal
  input:
    goals: []
  expected_signals:
    - signal: goal_progress
      decision: no_data
      confidence_min: 1.0

- id: goal_not_active
  description: Only completed/abandoned goals → on_track (no active goals)
  input:
    goals:
      - id: g1
        title: "Learn Piano"
        status: "완료"
        progress: 100
  expected_signals:
    - signal: goal_progress
      decision: on_track

- id: goal_on_track_high_progress_no_due
  description: Active goal, 80% progress, no due date → on_track
  input:
    goals:
      - id: g2
        title: "Learn Python"
        status: "진행중"
        progress: 80
  expected_signals:
    - signal: goal_progress
      decision: on_track
      confidence_min: 0.8

- id: goal_on_track_moderate_progress_no_due
  description: Active goal, 45% progress, no due date → on_track (moderate)
  input:
    goals:
      - id: g3
        title: "Read 12 books"
        status: "진행중"
        progress: 45
  expected_signals:
    - signal: goal_progress
      decision: on_track
      confidence_min: 0.6

- id: goal_at_risk_low_progress_no_due
  description: Active goal, 15% progress, no due date → at_risk
  input:
    goals:
      - id: g4
        title: "Side project launch"
        status: "진행중"
        progress: 15
  expected_signals:
    - signal: goal_progress
      decision: at_risk
      confidence_min: 0.6

- id: goal_action_required_overdue
  description: Active goal past its due date (2025-01-10 < ref) → action_required
  input:
    goals:
      - id: g5
        title: "Finish report"
        status: "진행중"
        progress: 40
        dueDate: "2025-01-10"
  expected_signals:
    - signal: goal_progress
      decision: action_required
      confidence_min: 1.0
      explanation_contains: "past due"

- id: goal_action_required_low_progress_near_deadline
  description: <30% progress with 3 days left → action_required
  input:
    goals:
      - id: g6
        title: "Prepare presentation"
        status: "진행중"
        progress: 20
        dueDate: "2025-01-18"
  expected_signals:
    - signal: goal_progress
      decision: action_required
      confidence_min: 0.85

- id: goal_at_risk_near_deadline
  description: 35% progress with 10 days left (<14 days) → at_risk
  input:
    goals:
      - id: g7
        title: "Study for exam"
        status: "진행중"
        progress: 35
        dueDate: "2025-01-25"
  expected_signals:
    - signal: goal_progress
      decision: at_risk
      confidence_min: 0.7

- id: goal_on_track_with_due_date
  description: 70% progress with 20 days left → on_track
  input:
    goals:
      - id: g8
        title: "Complete online course"
        status: "진행중"
        progress: 70
        dueDate: "2025-02-04"
  expected_signals:
    - signal: goal_progress
      decision: on_track
      confidence_min: 0.8

# ============================================================
# task_urgency signals
# ============================================================

- id: task_no_data
  description: No tasks → no_data signal
  input:
    tasks: []
  expected_signals:
    - signal: task_urgency
      decision: no_data
      confidence_min: 1.0

- id: task_action_required_q1_pending
  description: One pending Q1 task → action_required
  input:
    tasks:
      - id: t1
        title: "Fix critical production bug"
        quadrant: "Q1"
        completed: false
  expected_signals:
    - signal: task_urgency
      decision: action_required
      confidence_min: 1.0
      explanation_contains: "Q1"

- id: task_action_required_multiple_q1
  description: Multiple pending Q1 tasks → action_required
  input:
    tasks:
      - id: t2
        title: "Deploy hotfix"
        quadrant: "Q1"
        completed: false
      - id: t3
        title: "Respond to client escalation"
        quadrant: "Q1"
        completed: false
  expected_signals:
    - signal: task_urgency
      decision: action_required

- id: task_at_risk_q2_pending
  description: No Q1 tasks, one Q2 pending → at_risk
  input:
    tasks:
      - id: t4
        title: "Write unit tests"
        quadrant: "Q2"
        completed: false
  expected_signals:
    - signal: task_urgency
      decision: at_risk
      confidence_min: 0.7

- id: task_on_track_q1_completed
  description: Q1 task is completed, Q2 pending → at_risk (not action_required)
  input:
    tasks:
      - id: t5
        title: "Deploy hotfix"
        quadrant: "Q1"
        completed: true
      - id: t6
        title: "Refactor auth module"
        quadrant: "Q2"
        completed: false
  expected_signals:
    - signal: task_urgency
      decision: at_risk

- id: task_on_track_all_completed
  description: All Q1 and Q2 tasks completed → on_track
  input:
    tasks:
      - id: t7
        title: "Fix login bug"
        quadrant: "Q1"
        completed: true
      - id: t8
        title: "Write docs"
        quadrant: "Q2"
        completed: true
  expected_signals:
    - signal: task_urgency
      decision: on_track
      confidence_min: 1.0

# ============================================================
# habit_consistency signals
# ============================================================

- id: habit_no_data
  description: No habits → no_data signal
  input:
    habits: []
  expected_signals:
    - signal: habit_consistency
      decision: no_data
      confidence_min: 1.0

- id: habit_at_risk_no_check_dates
  description: Habit with empty checkDates → at_risk
  input:
    habits:
      - id: h1
        name: "Morning run"
        checkDates: []
  expected_signals:
    - signal: habit_consistency
      decision: at_risk
      explanation_contains: "Morning run"

- id: habit_at_risk_stale
  description: Habit last checked 4 days ago → at_risk (threshold is 3 days)
  input:
    habits:
      - id: h2
        name: "Evening reading"
        checkDates:
          - "2025-01-11"
  expected_signals:
    - signal: habit_consistency
      decision: at_risk

- id: habit_on_track_checked_yesterday
  description: Habit checked 1 day ago → on_track
  input:
    habits:
      - id: h3
        name: "Meditation"
        checkDates:
          - "2025-01-14"
  expected_signals:
    - signal: habit_consistency
      decision: on_track
      confidence_min: 0.9

- id: habit_on_track_checked_today
  description: Habit checked on reference date → on_track
  input:
    habits:
      - id: h4
        name: "Cold shower"
        checkDates:
          - "2025-01-15"
  expected_signals:
    - signal: habit_consistency
      decision: on_track

- id: habit_at_risk_mixed
  description: One habit on-track, one stale → at_risk overall
  input:
    habits:
      - id: h5
        name: "Journaling"
        checkDates:
          - "2025-01-14"
      - id: h6
        name: "Stretching"
        checkDates:
          - "2025-01-10"
  expected_signals:
    - signal: habit_consistency
      decision: at_risk

# ============================================================
# workout_frequency signals
# ============================================================

- id: workout_no_data
  description: No workouts → no_data signal
  input:
    workouts: []
  expected_signals:
    - signal: workout_frequency
      decision: no_data
      confidence_min: 1.0

- id: workout_action_required_none_recent
  description: Workout exists but more than 7 days ago → action_required
  input:
    workouts:
      - id: w1
        date: "2025-01-01"
        type: "달리기"
        duration: 30
  expected_signals:
    - signal: workout_frequency
      decision: action_required
      confidence_min: 0.8

- id: workout_at_risk_one_session
  description: Only 1 workout in last 7 days → at_risk
  input:
    workouts:
      - id: w2
        date: "2025-01-12"
        type: "헬스"
        duration: 60
  expected_signals:
    - signal: workout_frequency
      decision: at_risk
      confidence_min: 0.7

- id: workout_on_track_three_sessions
  description: 3 workouts in last 7 days → on_track
  input:
    workouts:
      - id: w3
        date: "2025-01-13"
        type: "달리기"
        duration: 30
      - id: w4
        date: "2025-01-11"
        type: "헬스"
        duration: 45
      - id: w5
        date: "2025-01-09"
        type: "요가"
        duration: 30
  expected_signals:
    - signal: workout_frequency
      decision: on_track
      confidence_min: 0.8

- id: workout_on_track_boundary_day_7
  description: >
    Workout exactly 7 days before reference_date is included in the 7-day window
    (inclusive boundary: days_diff <= 7). Two sessions total → on_track.
  input:
    workouts:
      - id: w6
        date: "2025-01-08"
        type: "수영"
        duration: 40
      - id: w7
        date: "2025-01-13"
        type: "달리기"
        duration: 25
  expected_signals:
    - signal: workout_frequency
      decision: on_track

# ============================================================
# lifewheel_balance signals
# ============================================================

- id: lifewheel_no_data
  description: No life-wheel data → no_data signal
  input:
    lifewheel: null
  expected_signals:
    - signal: lifewheel_balance
      decision: no_data
      confidence_min: 1.0

- id: lifewheel_action_required_low_domain
  description: One domain below 4 (건강=3) → action_required
  input:
    lifewheel:
      scores:
        건강: 3
        재정: 7
        커리어: 6
        관계: 8
        성장: 5
        여가: 6
        환경: 7
        정신/영적: 6
  expected_signals:
    - signal: lifewheel_balance
      decision: action_required
      confidence_min: 0.9
      explanation_contains: "건강"

- id: lifewheel_at_risk_low_average
  description: All domains ≥ 4 but average < 6 (avg ≈ 4.75) → at_risk
  input:
    lifewheel:
      scores:
        건강: 5
        재정: 5
        커리어: 4
        관계: 5
        성장: 5
        여가: 4
        환경: 5
        정신/영적: 5
  expected_signals:
    - signal: lifewheel_balance
      decision: at_risk
      confidence_min: 0.7

- id: lifewheel_on_track_high_scores
  description: All domains ≥ 6, average ≈ 7.75 → on_track
  input:
    lifewheel:
      scores:
        건강: 8
        재정: 7
        커리어: 8
        관계: 9
        성장: 7
        여가: 8
        환경: 7
        정신/영적: 8
  expected_signals:
    - signal: lifewheel_balance
      decision: on_track
      confidence_min: 0.8
