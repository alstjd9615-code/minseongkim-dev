AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AI Portfolio Builder – AWS Serverless stack
  (API Gateway + Lambda + Bedrock + DynamoDB + S3 + CloudFront)

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Handler: handler.handler
    Timeout: 60
    MemorySize: 256
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        SESSIONS_TABLE: !Ref SessionsTable
        PORTFOLIOS_TABLE: !Ref PortfoliosTable
        CORS_ORIGIN: !Sub "https://${CloudFrontDistribution.DomainName}"
        BEDROCK_REGION: !Ref AWS::Region
        BEDROCK_MODEL_ID: "anthropic.claude-3-5-sonnet-20240620-v1:0"
        MAX_TOKENS: "4096"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: !Sub "'https://${CloudFrontDistribution.DomainName}'"

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Shared Lambda Layer (Python dependencies) ───────────────────────────
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "portfolio-deps-${Environment}"
      Description: Shared Python dependencies (boto3)
      ContentUri: ../backend/
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

  # ── DynamoDB Tables ──────────────────────────────────────────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  PortfoliosTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-data-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: sessionId-index
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── IAM Role (shared by Lambda functions) ───────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "portfolio-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt PortfoliosTable.Arn
                  - !Sub "${PortfoliosTable.Arn}/index/*"
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-sonnet-20240620-v1:0"

  # ── Lambda Functions ─────────────────────────────────────────────────────
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-chat-${Environment}"
      CodeUri: ../backend/functions/chat/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Handle chat messages via Bedrock and update portfolio"
      Events:
        ChatPost:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /chat
            Method: POST
        ChatOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /chat
            Method: OPTIONS

  PortfolioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-crud-${Environment}"
      CodeUri: ../backend/functions/portfolio/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "CRUD operations for portfolio data"
      Events:
        PortfolioGet:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: GET
        PortfolioPut:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: PUT
        PortfolioOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: OPTIONS

  # ── API Gateway ──────────────────────────────────────────────────────────
  PortfolioApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "portfolio-api-${Environment}"
      StageName: !Ref Environment
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

  # ── S3 Bucket (frontend static assets) ──────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "portfolio-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Distribution ──────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "portfolio-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "AI Portfolio Builder – ${Environment}"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
          - Id: ApiOrigin
            DomainName: !Sub "${PortfolioApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: !Sub "/${Environment}/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${PortfolioApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  CloudFrontUrl:
    Description: "CloudFront distribution URL"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  FrontendBucketName:
    Description: "S3 bucket name for frontend assets"
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucket"

  SessionsTableName:
    Description: "DynamoDB sessions table name"
    Value: !Ref SessionsTable
    Export:
      Name: !Sub "${AWS::StackName}-SessionsTable"

  PortfoliosTableName:
    Description: "DynamoDB portfolios table name"
    Value: !Ref PortfoliosTable
    Export:
      Name: !Sub "${AWS::StackName}-PortfoliosTable"
