AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AI Portfolio Builder - AWS Serverless stack
  (API Gateway + Lambda + Bedrock + DynamoDB + S3 + CloudFront + Cognito)

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.14
    Handler: handler.handler
    Timeout: 60
    MemorySize: 256
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        SESSIONS_TABLE: !Ref SessionsTable
        PORTFOLIOS_TABLE: !Ref PortfoliosTable
        DIARY_TABLE: !Ref DiaryTable
        BLOG_TABLE: !Ref BlogTable
        CORS_ORIGIN: !Ref AllowedOrigin
        BEDROCK_REGION: !Ref AWS::Region
        BEDROCK_MODEL_ID: "anthropic.claude-3-5-sonnet-20240620-v1:0"
        MAX_TOKENS: "4096"
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: !Sub "'${AllowedOrigin}'"

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  AllowedOrigin:
    Type: String
    Default: "*"
    Description: >
      Allowed CORS origin for API Gateway and Lambda.
      On initial deploy, keep the default '*'.
      After the CloudFront distribution is created, update this parameter
      to 'https://<distribution-domain>.cloudfront.net' to restrict CORS.

  ApiDomainName:
    Type: String
    Default: ""
    Description: >
      API Gateway domain name for the CloudFront API origin.
      Leave empty on the FIRST deployment (CloudFront will serve S3 only).
      After the first deployment, copy the value from the ApiUrl output
      (e.g. abc123.execute-api.ap-northeast-2.amazonaws.com) and redeploy
      to enable CloudFront → API Gateway proxying.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasApiDomainName: !Not [!Equals [!Ref ApiDomainName, ""]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── Cognito User Pool ────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "portfolio-user-pool-${Environment}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      UserPoolTags:
        Environment: !Ref Environment

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "portfolio-app-client-${Environment}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  # ── Shared Lambda Layer (Python dependencies) ───────────────────────────
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "portfolio-deps-${Environment}"
      Description: Shared Python dependencies (boto3)
      ContentUri: ../backend/
      CompatibleRuntimes:
        - python3.14
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.14

  # ── DynamoDB Tables ──────────────────────────────────────────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  PortfoliosTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-data-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: sessionId-index
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  BlogTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-blog-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: postId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: publishedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: postId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-publishedAt-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: publishedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  DiaryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "portfolio-diary-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: entryId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: entryId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: category-createdAt-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── IAM Role (shared by Lambda functions) ───────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "portfolio-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt SessionsTable.Arn
                  - !GetAtt PortfoliosTable.Arn
                  - !Sub "${PortfoliosTable.Arn}/index/*"
                  - !GetAtt DiaryTable.Arn
                  - !Sub "${DiaryTable.Arn}/index/*"
                  - !GetAtt BlogTable.Arn
                  - !Sub "${BlogTable.Arn}/index/*"
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-5-sonnet-20240620-v1:0"

  # ── Lambda Functions ─────────────────────────────────────────────────────
  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-chat-${Environment}"
      CodeUri: ../backend/functions/chat/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Handle chat messages via Bedrock and update portfolio"
      Events:
        ChatPost:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /chat
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        ChatOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /chat
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  PortfolioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-crud-${Environment}"
      CodeUri: ../backend/functions/portfolio/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "CRUD operations for portfolio data"
      Events:
        PortfolioGet:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        PortfolioPut:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer
        PortfolioOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /portfolio/{sessionId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  DiaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-diary-${Environment}"
      CodeUri: ../backend/functions/diary/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Diary CRUD with Bedrock category classification"
      Events:
        DiaryPost:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /diary
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        DiaryGet:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /diary
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        DiaryOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /diary
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  StatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-stats-${Environment}"
      CodeUri: ../backend/functions/stats/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Diary statistics aggregation"
      Events:
        StatsGet:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /stats
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        StatsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /stats
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  PublicPortfolioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-public-${Environment}"
      CodeUri: ../backend/functions/public/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Public portfolio access (no auth required)"
      Events:
        PublicGet:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/{portfolioId}
            Method: GET
            Auth:
              Authorizer: NONE
        PublicOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/{portfolioId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  BlogFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-blog-${Environment}"
      CodeUri: ../backend/functions/blog/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Blog post CRUD with AI generation from diary entries"
      Events:
        BlogPost:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        BlogGetList:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        BlogGetItem:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
        BlogPut:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer
        BlogDelete:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer
        BlogOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        BlogItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  PublicBlogFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-public-blog-${Environment}"
      CodeUri: ../backend/functions/public_blog/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Public blog access (no auth required)"
      Events:
        PublicBlogGetList:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/blog/{userId}
            Method: GET
            Auth:
              Authorizer: NONE
        PublicBlogGetItem:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/blog/{userId}/{postId}
            Method: GET
            Auth:
              Authorizer: NONE
        PublicBlogListOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/blog/{userId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
        PublicBlogItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /public/blog/{userId}/{postId}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  BlogPublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "portfolio-blog-publish-${Environment}"
      CodeUri: ../backend/functions/blog_publish/
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Blog post publishing to external platforms (Medium, Tistory)"
      Events:
        BlogPublishPost:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}/publish/{platform}
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
        BlogPublishOptions:
          Type: Api
          Properties:
            RestApiId: !Ref PortfolioApi
            Path: /blog/{postId}/publish/{platform}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

  # ── API Gateway ──────────────────────────────────────────────────────────
  PortfolioApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "portfolio-api-${Environment}"
      StageName: !Ref Environment
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization

  # ── S3 Bucket (frontend static assets) ──────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "portfolio-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Distribution ──────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "portfolio-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "AI Portfolio Builder - ${Environment}"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
          - !If
            - HasApiDomainName
            - Id: ApiOrigin
              DomainName: !Ref ApiDomainName
              CustomOriginConfig:
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
            - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - !If
            - HasApiDomainName
            - PathPattern: !Sub "/${Environment}/*"
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: https-only
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
              AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            - !Ref AWS::NoValue
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${PortfolioApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  ApiDomainName:
    Description: >
      API Gateway domain name - use this value for the ApiDomainName parameter
      on the second deployment to enable CloudFront → API proxying.
    Value: !Sub "${PortfolioApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiDomainName"

  CloudFrontUrl:
    Description: "CloudFront distribution URL"
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  FrontendBucketName:
    Description: "S3 bucket name for frontend assets"
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucket"

  SessionsTableName:
    Description: "DynamoDB sessions table name"
    Value: !Ref SessionsTable
    Export:
      Name: !Sub "${AWS::StackName}-SessionsTable"

  PortfoliosTableName:
    Description: "DynamoDB portfolios table name"
    Value: !Ref PortfoliosTable
    Export:
      Name: !Sub "${AWS::StackName}-PortfoliosTable"

  DiaryTableName:
    Description: "DynamoDB diary table name"
    Value: !Ref DiaryTable
    Export:
      Name: !Sub "${AWS::StackName}-DiaryTable"

  BlogTableName:
    Description: "DynamoDB blog table name"
    Value: !Ref BlogTable
    Export:
      Name: !Sub "${AWS::StackName}-BlogTable"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"
